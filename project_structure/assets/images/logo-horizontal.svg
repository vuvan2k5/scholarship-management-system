<?xml version="1.0" encoding="UTF-8"?>
<!--
  Scholarship System — Horizontal Logo SVG
  Layout: [S + cap + book icon] + [Scholarship | System | tagline]
  Viewbox: 420 × 120
  Colors: navy #1e3a5f | blue #2563eb | gold #f59e0b | text-dark #0f172a | gray #64748b
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120"
     width="420" height="120"
     role="img" aria-label="Scholarship System — Secure, Reliable, Efficient">
  <title>Scholarship System</title>
  <desc>Official horizontal logo of the Scholarship Management System. Tagline: Secure • Reliable • Efficient</desc>

  <defs>
    <linearGradient id="hSGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="hBookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="hCapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="hTextBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════════
       ICON GROUP  (left, scaled to fit 120h)
  ══════════════════════════════════════════ -->
  <g transform="translate(6, 0) scale(0.97)">

    <!-- LETTER S -->
    <path d="
      M 62,28
      C 62,28 58,22 50,22
      C 38,22 28,30 28,40
      C 28,50 36,54 50,58
      C 64,62 72,66 72,78
      C 72,90 60,98 48,98
      C 36,98 28,90 26,84
      "
      fill="none"
      stroke="url(#hSGrad)"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- OPEN BOOK -->
    <!-- Left page -->
    <path d="M 18,102 Q 18,94 30,91 L 50,95 L 50,110 Q 36,107 18,112 Z"
          fill="url(#hBookGrad)" opacity="0.92"/>
    <!-- Right page -->
    <path d="M 82,102 Q 82,94 70,91 L 50,95 L 50,110 Q 64,107 82,112 Z"
          fill="url(#hBookGrad)" opacity="0.78"/>
    <!-- Spine -->
    <line x1="50" y1="93" x2="50" y2="112"
          stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <!-- Page lines left -->
    <line x1="22" y1="100" x2="46" y2="97" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
    <line x1="23" y1="104" x2="46" y2="101" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
    <!-- Page lines right -->
    <line x1="78" y1="100" x2="54" y2="97" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
    <line x1="77" y1="104" x2="54" y2="101" stroke="#ffffff" stroke-width="1" opacity="0.25"/>

    <!-- GRADUATION CAP -->
    <polygon points="18,26 50,14 82,26 50,38" fill="url(#hCapGrad)"/>
    <polygon points="20,26 50,15 80,26 50,37" fill="#1d4ed8" opacity="0.55"/>
    <polygon points="22,27 50,38 78,27 50,37" fill="#0f172a" opacity="0.25"/>
    <circle cx="50" cy="14" r="2.5" fill="#f59e0b"/>
    <!-- Tassel -->
    <line x1="76" y1="26" x2="82" y2="40"
          stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <rect x="79" y="40" width="5" height="7" rx="2.5" fill="#f59e0b"/>

  </g>

  <!-- ══════════════════════════════════════════
       TEXT GROUP  (right side)
  ══════════════════════════════════════════ -->
  <!-- "Scholarship" — dark navy, heavy -->
  <text x="108" y="52"
        font-family="'Inter', 'Roboto', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="32" font-weight="800"
        fill="#0f172a"
        letter-spacing="-0.5">Scholarship</text>

  <!-- "System" — electric blue, heavy -->
  <text x="108" y="86"
        font-family="'Inter', 'Roboto', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="32" font-weight="800"
        fill="#2563eb"
        letter-spacing="-0.5">System</text>

  <!-- Tagline — gray, light weight -->
  <text x="110" y="107"
        font-family="'Inter', 'Roboto', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="12" font-weight="400"
        fill="#64748b"
        letter-spacing="0.3">Secure  •  Reliable  •  Efficient</text>

  <!-- Thin accent rule between icon and text -->
  <line x1="100" y1="20" x2="100" y2="106"
        stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
</svg>
