<?xml version="1.0" encoding="UTF-8"?>
<!--
  Scholarship System — Compact Icon SVG
  Icon: stylized S + graduation cap (top) + open book (bottom)
  Viewbox: 100 × 120  |  Use at any size (SVG scales perfectly)
  Colors: navy #1e3a5f | blue #2563eb | gold #f59e0b | white #ffffff
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"
     width="100" height="120"
     role="img" aria-label="Scholarship System Icon">
  <title>Scholarship System</title>
  <defs>
    <!-- S body gradient -->
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Book gradient -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <!-- Cap gradient -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════
       LETTER  S
  ══════════════════════════════════ -->
  <!-- Main S path — thick, bold, rounded -->
  <path d="
    M 62,28
    C 62,28 58,22 50,22
    C 38,22 28,30 28,40
    C 28,50 36,54 50,58
    C 64,62 72,66 72,78
    C 72,90 60,98 48,98
    C 36,98 28,90 26,84
    "
    fill="none"
    stroke="url(#sGrad)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- ══════════════════════════════════
       OPEN BOOK (bottom of S)
  ══════════════════════════════════ -->
  <!-- Left page -->
  <path d="M 18,102 Q 18,94 30,91 L 50,95 L 50,110 Q 36,107 18,112 Z"
        fill="url(#bookGrad)" opacity="0.92"/>
  <!-- Right page -->
  <path d="M 82,102 Q 82,94 70,91 L 50,95 L 50,110 Q 64,107 82,112 Z"
        fill="url(#bookGrad)" opacity="0.78"/>
  <!-- Book spine highlight -->
  <line x1="50" y1="93" x2="50" y2="112"
        stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Left page lines -->
  <line x1="22" y1="100" x2="46" y2="97" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="23" y1="104" x2="46" y2="101" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <!-- Right page lines -->
  <line x1="78" y1="100" x2="54" y2="97" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="77" y1="104" x2="54" y2="101" stroke="#ffffff" stroke-width="1" opacity="0.25"/>

  <!-- ══════════════════════════════════
       GRADUATION CAP (top of S)
  ══════════════════════════════════ -->
  <!-- Cap board (flat diamond/trapezoid) -->
  <polygon points="18,26 50,14 82,26 50,38"
           fill="url(#capGrad)"/>
  <!-- Cap top face (slightly lighter) -->
  <polygon points="20,26 50,15 80,26 50,37"
           fill="#1d4ed8" opacity="0.55"/>
  <!-- Cap underside shadow -->
  <polygon points="22,27 50,38 78,27 50,37"
           fill="#0f172a" opacity="0.25"/>
  <!-- Cap button / top -->
  <circle cx="50" cy="14" r="2.5" fill="#f59e0b"/>
  <!-- Tassel string -->
  <line x1="76" y1="26" x2="82" y2="40"
        stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end bundle -->
  <rect x="79" y="40" width="5" height="7" rx="2.5" fill="#f59e0b"/>
</svg>
